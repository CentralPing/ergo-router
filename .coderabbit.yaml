chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
  linked_repositories:
    - repository: "CentralPing/ergo"
      instructions: >
        Core middleware toolkit. ergo-router consumes shared primitives from ergo's
        lib/ (cors, rate-limit, security-headers, attach-instance, vary,
        sanitize-quoted-string) and composes ergo's pipeline middleware via
        pipeline-builder.js. Changes to ergo's lib/ exports or middleware return
        conventions may require ergo-router updates.
    - repository: "CentralPing/centralping.github.io"
      instructions: >
        Project documentation website. API reference is generated from ergo-router's
        JSDoc via starlight-typedoc. README content and route config documentation
        should stay synchronized with the website guides.
