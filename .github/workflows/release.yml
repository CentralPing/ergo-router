name: Release
on:
  release:
    types: [published]
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: CentralPing/ergo
          path: .ergo-peer
      - run: ln -s "$GITHUB_WORKSPACE/.ergo-peer" "$GITHUB_WORKSPACE/../ergo"
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install --ignore-scripts --prefix "$GITHUB_WORKSPACE/.ergo-peer"
      - run: npm install --ignore-scripts
      - run: npm test
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
