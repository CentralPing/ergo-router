name: Release
on:
  release:
    types: [published]
permissions: {}
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: CentralPing/ergo
          path: .ergo-peer
      - run: ln -s "$GITHUB_WORKSPACE/.ergo-peer" "$GITHUB_WORKSPACE/../ergo"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install --ignore-scripts --prefix "$GITHUB_WORKSPACE/.ergo-peer"
      - run: npm ci --ignore-scripts
      - run: npm test
      - name: Determine dist-tag
        id: dist-tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if echo "$VERSION" | grep -q '-'; then
            echo "tag=--tag beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
      - run: npm publish --provenance ${{ steps.dist-tag.outputs.tag }}
      - if: success()
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        continue-on-error: true
        with:
          token: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          repository: CentralPing/centralping.github.io
          event-type: docs-update
          client-payload: '{"package": "ergo-router", "version": "${{ github.event.release.tag_name }}"}'
